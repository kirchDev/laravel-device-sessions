name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'config/**'
      - 'database/**'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.json'
      - '**/*.jsonc'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.md'
      - 'composer.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'phpstan.neon'
      - 'phpunit.xml.dist'
      - 'pint.json'
      - '.oxlintrc.json'
      - '.oxfmtrc.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    # ready_for_review is required so the dev→main rollup PR (opened as a draft
    # by GITHUB_TOKEN, which triggers no workflows) runs CI once a human marks
    # it ready — otherwise main's required status checks deadlock the rollup.
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'config/**'
      - 'database/**'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.json'
      - '**/*.jsonc'
      - '**/*.yml'
      - '**/*.yaml'
      - '**/*.md'
      - 'composer.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'phpstan.neon'
      - 'phpunit.xml.dist'
      - 'pint.json'
      - '.oxlintrc.json'
      - '.oxfmtrc.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  COMPOSER_NO_AUDIT: 1
  COMPOSER_NO_INTERACTION: 1
  COMPOSER_PROCESS_TIMEOUT: 0

jobs:
  node-check:
    name: Node check (lint + format)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Run check (lint + format)
        run: pnpm check

  test:
    name: Pest (PHP ${{ matrix.php }}, Laravel ${{ matrix.laravel }}, ${{ matrix.dependencies }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        laravel: ['13.*']
        dependencies: [highest, lowest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite3, pdo_sqlite
          coverage: none
      - name: Cache Composer downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ matrix.dependencies }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ matrix.dependencies }}-
      - name: Pin Laravel version
        run: |
          composer require \
            "illuminate/auth:${{ matrix.laravel }}" \
            "illuminate/cache:${{ matrix.laravel }}" \
            "illuminate/console:${{ matrix.laravel }}" \
            "illuminate/contracts:${{ matrix.laravel }}" \
            "illuminate/cookie:${{ matrix.laravel }}" \
            "illuminate/database:${{ matrix.laravel }}" \
            "illuminate/events:${{ matrix.laravel }}" \
            "illuminate/http:${{ matrix.laravel }}" \
            "illuminate/support:${{ matrix.laravel }}" \
            --no-update --no-interaction
      - name: Install Composer dependencies
        run: |
          composer update --prefer-dist --no-progress \
            ${{ matrix.dependencies == 'lowest' && '--prefer-lowest --prefer-stable' || '' }}
      - name: Run Pest
        run: composer test

  test-pgsql:
    name: Pest (PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: device_sessions_test
          POSTGRES_USER: device_sessions
          POSTGRES_PASSWORD: device_sessions
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U device_sessions"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: device_sessions_test
      DB_USERNAME: device_sessions
      DB_PASSWORD: device_sessions

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_pgsql
          coverage: none
      - name: Cache Composer downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-pgsql-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-pgsql-
      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-progress
      - name: Run Pest
        run: composer test

  coverage:
    name: Coverage (PCOV → Codecov)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite3, pdo_sqlite, pcov
          coverage: pcov
          ini-values: pcov.directory=src
      - name: Cache Composer downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-coverage-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-coverage-
      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-progress
      - name: Run Pest with coverage
        run: vendor/bin/pest --coverage --coverage-clover=coverage.xml --min=90
      - name: Fetch Codecov token from Bitwarden
        # Dependabot PRs run without access to repository secrets, so the
        # Bitwarden access token is empty. Skip the token fetch + upload there.
        if: github.actor != 'dependabot[bot]'
        uses: bitwarden/sm-action@27c0c9dcab679d7250dbab91227c85b49ffa5e0f # v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          cloud_region: eu
          secrets: |
            dc11814a-a909-411d-9b6a-b4540178ee21 > CODECOV_TOKEN

      - name: Upload coverage to Codecov
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage.xml
          fail_ci_if_error: false
          flags: pest
          name: codecov-pest
          token: ${{ env.CODECOV_TOKEN }}

  lint:
    name: Pint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.4'
          coverage: none
      - name: Cache Composer downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-pint-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-pint-
      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-progress
      - name: Run Pint
        run: composer pint

  static-analysis:
    name: Larastan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite3, pdo_sqlite
          coverage: none
      - name: Cache Composer downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-larastan-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-larastan-
      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-progress
      - name: Run Larastan
        run: composer larastan
