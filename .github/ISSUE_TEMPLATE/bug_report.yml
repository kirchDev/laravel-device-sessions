name: 🐛 Bug report
description: Something isn't working as expected
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below.
        For security vulnerabilities, see [SECURITY.md](https://github.com/kirchDev/laravel-device-sessions/blob/main/SECURITY.md) instead.

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: php
    attributes:
      label: PHP version
      placeholder: e.g. 8.4.5
    validations:
      required: true

  - type: input
    id: laravel
    attributes:
      label: Laravel version
      placeholder: e.g. 13.2.1
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: A minimal failing Pest test (preferred), or step-by-step instructions to reproduce.
      render: php
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Logs, screenshots, related config, etc.
