# Codecov configuration.
#
# Validate locally with:
#   curl -s --data-binary @codecov.yml https://codecov.io/validate

coverage:
  precision: 2
  round: down
  range: 80..100

  status:
    project:
      default:
        # Fail the CI check when overall project coverage drops below 90%.
        target: 90%
        # Allow tiny drift between runs (e.g. flaky branch coverage) without going red.
        threshold: 1%
        if_ci_failed: error
        only_pulls: false
    patch:
      default:
        # New / changed lines in a PR must be at least 80% covered.
        target: 80%
        threshold: 0%
        if_ci_failed: error

# Codecov updates an existing PR comment by default ("default" behaviour);
# this block makes the contract explicit so it doesn't drift if upstream changes.
comment:
  layout: 'reach, diff, flags, files'
  behavior: default
  require_changes: false
  show_carryforward_flags: false
